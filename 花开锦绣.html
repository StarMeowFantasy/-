      "ISTP": { name: "杜若", yayi: "幽谷孤侠，实操之神", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E6%9D%9C%E8%8B%A5.jpg", poem: "人狠话不多，动手能力满级，拆电脑、修水管、野外求生都难不倒。外表冷峻，像幽谷里的杜若不主动亲近人，但朋友遇险时，第一个冲上去的一定是你。\n→ 《花开锦绣》里靠一双拳头闯江湖的硬汉，就是你的缩影。" },
      "ISFP": { name: "朝颜", yayi: "晨露易逝，唯美画师", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E6%9C%9D%E9%A2%9C.jpg", poem: "人间的感官诗人，总在晨光、落叶、雨滴里捕捉别人忽略的美。内心戏可以拍八十集文艺片，表面上永远云淡风轻。脆弱只在清晨独自展露。\n→ 《花开锦绣》的每一帧绝美画面，都与你的审美DNA共振。" },
      "ESTP": { name: "紫薇", yayi: "独占芳菲，冒险玩家", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%B4%AB%E8%96%87.jpg", poem: "天生的急智者，越紧张越兴奋，越混乱越清醒。热衷冒险，享受不可预知的刺激，对“按部就班”有着本能的抗拒。每一次“冒险”都经过脑内高速模拟。\n→ 《花开锦绣》里以奇制胜的名场面，你闭着眼都能演。" },
      "ESFP": { name: "合欢", yayi: "夜合欢颜，人间烟火", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E5%90%88%E6%AC%A2.jpg", poem: "人群中的多巴胺喷射机，有你在的地方再冷的场子也能沸腾。连吃碗面都能吃出米其林的感觉。深夜偶尔孤独，睡一觉又满血复活。\n→ 《花开锦绣》里那些嬉笑怒骂的烟火气瞬间，就是你存在的意义。" },
      "EI_balance": { name: "木兰", yayi: "内外兼修，双面镜心", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E6%9C%A8%E5%85%B0.jpg", poem: "人群中谈笑风生，转身也能享受独处的深邃。不是社牛也不是社恐，是“社适”——能根据场合自动切换频率。最大的天赋是分寸感，从不越界，从不冷场。\n→ 《花开锦绣》里既能周旋朝堂、又能隐居山野的双面智者，就是你的剪影。" },
      "SN_balance": { name: "白芷", yayi: "虚实相生，通感之灵", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%99%BD%E8%8A%B7.jpg", poem: "既爱茶水的温度、布料的手感，也沉迷抽象的诗意和遥远的幻想。思维常常“通感”——看见颜色会闻到味道，听见音乐会看见画面。务实的人觉得你不飘，浪漫的人觉得你不俗。\n→ 《花开锦绣》的世界观，为你这种通感灵魂而生。" },
      "TF_balance": { name: "泽兰", yayi: "情理交融，慈悲刀锋", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E6%B3%BD%E5%85%B0.jpg", poem: "理性与感性双核驱动。分析时逻辑冷静如手术刀，涉及人情时心肠又软如棉花糖。不被情绪绑架，也不被数据异化，总在天平两端找到最优雅的平衡。\n→ 《花开锦绣》里既能运筹帷幄、又能深情相拥的角色，正是你的剪影。" },
      "JP_balance": { name: "结香", yayi: "刚柔并济，自在从容", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%BB%93%E9%A6%99.jpg", poem: "享受计划的秩序感，又迷恋变数的惊喜。可以花三天做完美行程，到了全部推翻随性乱逛。看似随波逐流，实则暗握舵盘。心中有纲，行止无疆。\n→ 《花开锦绣》里既懂运筹、又敢冒险的主角气质，说的就是你。" }
    };

    const dimQuestions = { EI: [], SN: [], TF: [], JP: [] };
    questions.forEach((q, idx) => {
      q.options.forEach(opt => {
        for (let dim in opt.score) {
          if (dimQuestions[dim].indexOf(idx) === -1) {
            dimQuestions[dim].push(idx);
          }
        }
      });
    });

    function calcSubScore(dim) {
      const relatedIndices = dimQuestions[dim];
      let pos = 0, neg = 0;
      relatedIndices.forEach(i => {
        const ans = answers[i];
        if (!ans) return;
        const optIndex = ['A','B','C','D'].indexOf(ans);
        const chosenScore = questions[i].options[optIndex].score;
        if (chosenScore.hasOwnProperty(dim)) {
          if (chosenScore[dim] === 1) pos++;
          else if (chosenScore[dim] === -1) neg++;
        }
      });
      const total = pos + neg;
      return total > 0 ? (pos - neg) / total : 0;
    }

    let currentIndex = 0;
    let answers = new Array(questions.length).fill(null);
    let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };

    function loadState() {
      const savedAnswers = localStorage.getItem('quizAnswers');
      const savedScores = localStorage.getItem('quizScores');
      const savedIndex = localStorage.getItem('quizCurrentIndex');
      if (savedAnswers && savedScores && savedIndex) {
        try {
          answers = JSON.parse(savedAnswers);
          scores = JSON.parse(savedScores);
          currentIndex = parseInt(savedIndex, 10);
          if (answers.length !== questions.length) throw new Error('invalid');
        } catch(e) { resetState(); }
      }
    }

    function saveState() {
      localStorage.setItem('quizAnswers', JSON.stringify(answers));
      localStorage.setItem('quizScores', JSON.stringify(scores));
      localStorage.setItem('quizCurrentIndex', currentIndex);
    }

    function resetState() {
      answers = new Array(questions.length).fill(null);
      scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
      currentIndex = 0;
      localStorage.removeItem('quizAnswers');
      localStorage.removeItem('quizScores');
      localStorage.removeItem('quizCurrentIndex');
      localStorage.removeItem('quizResultType');
    }

    loadState();

    const quizDiv = document.getElementById("quiz");
    const submitArea = document.getElementById("submitArea");

    function showQuestion() {
      if (currentIndex < questions.length) {
        const q = questions[currentIndex];
        let html = `<div class="progress">第 ${currentIndex + 1} / ${questions.length} 题</div>`;
        html += `<div class="question">${q.question}</div><div class="options">`;
        const labels = ['A','B','C','D'];
        q.options.forEach((opt, idx) => {
          html += `<button class="option-btn" data-opt="${labels[idx]}" onclick="selectOption('${labels[idx]}', this)">${labels[idx]}. ${opt.text}</button>`;
        });
        html += `</div><button id="nextBtn" class="next-btn" onclick="nextQuestion()" disabled>下一题</button>`;
        quizDiv.innerHTML = html;
        submitArea.style.display = "none";
        if (answers[currentIndex] !== null) {
          document.querySelectorAll('.option-btn').forEach(btn => {
            if (btn.dataset.opt === answers[currentIndex]) btn.classList.add('selected');
          });
          document.getElementById('nextBtn').disabled = false;
        }
      } else {
        quizDiv.innerHTML = '';
        submitArea.style.display = 'block';
      }
    }

    window.selectOption = function(opt, element) {
      document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
      element.classList.add('selected');
      answers[currentIndex] = opt;
      document.getElementById('nextBtn').disabled = false;
    };

    window.nextQuestion = function() {
      if (answers[currentIndex] === null) { alert('请选择一个选项'); return; }
      const q = questions[currentIndex];
      const opt = answers[currentIndex];
      const scoreDelta = q.options[['A','B','C','D'].indexOf(opt)].score;
      for (let dim in scoreDelta) scores[dim] += scoreDelta[dim];
      currentIndex++;
      saveState();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      showQuestion();
    };

    function calculateType() {
      const dims = [
        { key: 'EI', left: 'E', right: 'I', balanceKey: 'EI_balance' },
        { key: 'SN', left: 'S', right: 'N', balanceKey: 'SN_balance' },
        { key: 'TF', left: 'T', right: 'F', balanceKey: 'TF_balance' },
        { key: 'JP', left: 'J', right: 'P', balanceKey: 'JP_balance' }
      ];
      const balanced = dims.filter(d => Math.abs(scores[d.key]) < 2);
      const nonBalanced = dims.filter(d => Math.abs(scores[d.key]) >= 2);
      if (balanced.length === 0) {
        return nonBalanced.map(d => scores[d.key] >= 2 ? d.left : d.right).join('');
      }
      if (balanced.length === 1) {
        return balanced[0].balanceKey;
      }
      const decisions = {};
      nonBalanced.forEach(d => {
        decisions[d.key] = scores[d.key] >= 2 ? d.left : d.right;
      });
      const subScores = {};
      balanced.forEach(d => {
        subScores[d.key] = calcSubScore(d.key);
      });
      const pending = balanced.map(d => d.key);
      while (pending.length > 0) {
        let bestDim = null;
        let bestAbs = -1;
        pending.forEach(dim => {
          const abs = Math.abs(subScores[dim]);
          if (abs > bestAbs) {
            bestAbs = abs;
            bestDim = dim;
          } else if (abs === bestAbs) {
            if (dims.findIndex(d => d.key === dim) < dims.findIndex(d => d.key === bestDim)) {
              bestDim = dim;
            }
          }
        });
        const sub = subScores[bestDim];
        if (sub > 0) {
          decisions[bestDim] = dims.find(d => d.key === bestDim).left;
        } else if (sub < 0) {
          decisions[bestDim] = dims.find(d => d.key === bestDim).right;
        } else {
          decisions[bestDim] = dims.find(d => d.key === bestDim).left;
        }
        const index = pending.indexOf(bestDim);
        pending.splice(index, 1);
      }
      return dims.map(d => decisions[d.key]).join('');
    }

    const guideModal = document.getElementById("guideModal");
    const reserveLink = document.getElementById("reserveLink");
    const reservedBtnContainer = document.getElementById("reservedBtnContainer");
    const floatBtn = document.getElementById("floatBtn");

    function createReservedButton() {
      if (document.getElementById("alreadyReservedBtn")) return;
      const btn = document.createElement("button");
      btn.id = "alreadyReservedBtn";
      btn.className = "btn-primary";
      btn.innerText = "我已预约，查看结果";
      btn.addEventListener("click", showResult);
      reservedBtnContainer.innerHTML = "";
      reservedBtnContainer.appendChild(btn);
    }

    function updateGuideModal() {
      if (localStorage.getItem("hasClickedReserve") === "true") {
        reserveLink.style.display = "none";
        createReservedButton();
        floatBtn.style.display = "flex";
      } else {
        reserveLink.style.display = "inline-block";
        reservedBtnContainer.innerHTML = "";
        floatBtn.style.display = "none";
      }
    }

    reserveLink.addEventListener("click", function(e) {
      e.preventDefault();
      localStorage.setItem("hasClickedReserve", "true");
      window.open(reserveLink.href, "_blank");
      updateGuideModal();
    });

    window.addEventListener("focus", function() {
      if (guideModal.style.display === "flex") updateGuideModal();
      if (currentIndex === questions.length && localStorage.getItem('hasClickedReserve') === 'true') {
        floatBtn.style.display = 'flex';
      }
    });

    document.getElementById("submitBtn").addEventListener("click", function() {
      saveState();
      if (localStorage.getItem("hasClickedReserve") === "true") {
        showResult();
      } else {
        guideModal.style.display = "flex";
        updateGuideModal();
      }
    });

    function showResult() {
      guideModal.style.display = "none";
      let typeKey = localStorage.getItem('quizResultType');
      if (!typeKey) {
        typeKey = calculateType();
        localStorage.setItem('quizResultType', typeKey);
      }
      const resultData = results[typeKey];
      if (!resultData) return;
      document.getElementById("flowerName").innerText = resultData.name;
      document.getElementById("flowerYayi").innerText = resultData.yayi;
      const imgElement = document.getElementById("flowerImg");
      if (resultData.img && resultData.img.trim() !== "") {
        imgElement.src = resultData.img;
        imgElement.style.display = "block";
      } else {
        imgElement.style.display = "none";
      }
      document.getElementById("flowerPoem").innerText = resultData.poem;
      document.getElementById("resultModal").style.display = "flex";
      floatBtn.style.display = "flex";
    }

    window.closeResult = function() {
      document.getElementById("resultModal").style.display = "none";
    };

    function checkAutoShowResult() {
      if (currentIndex === questions.length && localStorage.getItem('hasClickedReserve') === 'true') {
        quizDiv.innerHTML = '';
        submitArea.style.display = 'none';
        showResult();
        return true;
      }
      return false;
    }

    if (currentIndex === questions.length && localStorage.getItem('hasClickedReserve') === 'true') {
      floatBtn.style.display = 'flex';
    } else {
      floatBtn.style.display = 'none';
    }

    if (!checkAutoShowResult()) {
      showQuestion();
    }
  </script>
</body>
