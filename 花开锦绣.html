    // ================= 花神结果库 =================
    const results = {
      "INTJ": { name: "琼花", yayi: "维扬一株，孤傲帝王", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%90%BC%E8%8A%B1.jpg", poem: "你往那里一站，空气自动让出三尺。你像极了古画里独坐高阁的策士，不屑解释，不屑争辩，因为你早已看穿十步之后的结局。世人觉得你冷，只有你知道，这份冷是为了保护内心那座精密的城池。你的决断力像刀，切掉所有冗余，只留最锋利的真理。偶尔，你也会在深夜怀疑自己是否太过苛刻——但下一秒，你又开始规划明年的战略。在《花开锦绣》的世界里，你就是那个翻云覆雨、改天换地的执棋人，点击一窥你的锦绣棋局。" },
      "INTP": { name: "辛夷", yayi: "木笔书空，思辨之巅", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E8%BE%9B%E5%A4%B7.jpg", poem: "你的大脑是一座永不停机的实验室，每一个念头都在被拆解、重组、验证。你讨厌被感性绑架，但偏偏对“为什么”有着近乎偏执的浪漫。与人争论时，你像猫捉老鼠，享受逻辑的碾压快感，但转身又会对一本冷门科普书温柔地抚摸。你外表散漫，内心却有一张严丝合缝的思维地图——只是懒得向别人展示。《花开锦绣》里那些以智破局、绝地反杀的高光时刻，正是你的颅内日常。" },
      "ENTJ": { name: "锦带", yayi: "锦瑟华年，锋芒夺目", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E9%94%A6%E5%B8%A6.jpg", poem: "你是天生的“大场面生物”，走到哪里都像自带追光。你不仅能自己发光，还能把周围人的能量一并点燃。你厌恶无能，欣赏高效，对拖后腿的人毫不留情——但你的严厉背后，藏着一种“恨铁不成钢”的护短。你享受征服，更享受带着团队一起赢的快感。唯一的小毛病：偶尔会把“建议”错写成“命令”，还不许人改。《花开锦绣》里双强互宠、并肩封王的爽文设定，简直就是为你量身定制。" },
      "ENTP": { name: "棣棠", yayi: "金枝野性，风过即歌", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E6%A3%A3%E6%A3%A0.jpg", poem: "你就是那个在正经会议上突然抛出一个“如果地球是方的会怎样”的怪胎。你的脑袋里装着一整个平行宇宙，随时能抛出让人猝不及防的新观点。你享受辩论，不为输赢，只为享受思维碰撞的火花。你讨厌墨守成规，像风一样自由，却也像风一样难以被抓住。世人笑你善变，你却笑他们不懂——变，才是唯一的不变。 在《花开锦绣》里，那个用诡辩搅动风云的角色，就是你的镜像。" },
      "INFJ": { name: "素馨", yayi: "清香透骨，人间先知", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%B4%A0%E9%A6%A8.jpg", poem: "你像一座古寺里的晨钟，声音不大，却能穿透整座山谷。你拥有近乎玄学的第六感，总在众人狂欢时嗅到泡沫，在绝望中看见微光。你擅长共情，却从不滥情，因为你能看透情绪背后的因果链。你活得很累，因为你既想拯救世界，又嫌世界太吵。你常自嘲“想太多”，可正是这份“多”，让你成了朋友心中唯一值得托付秘密的人。《花开锦绣》中那个于暗夜守护初心、洞察一切的角色，说的就是你。" },
      "INFP": { name: "含笑", yayi: "半开犹卷，理想诗人", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E5%90%AB%E7%AC%91.jpg", poem: "你的灵魂是用月光和露水捏的，敏感得一碰就碎，却又坚韧得能扛住整个世界的不理解。你相信善良是一种选择，哪怕被辜负一百次，你依然会给第一百零一个人递上糖果。你的内心有一座秘密花园，里面住着你所有未完成的童话。你讨厌现实，但偏偏要活在现实里——这份撕裂感让你成了最深刻的创作家。《花开锦绣》里那些细腻的暗恋与执着的守望，正是你灵魂的底色。" },
      "ENFJ": { name: "瑞香", yayi: "祥瑞无声，炽热布道", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%91%9E%E9%A6%99.jpg", poem: "你天生自带“精神领袖”光环，短短几句话就能让人热血沸腾地跟着你冲。你热情得像一团火，却从不烧毁别人，只用来照亮前路。你善于发现每个人的闪光点，并用最温暖的方式把它们捧出来。你的脆弱藏在深夜——因为你背负了太多人的期待，却忘了自己也会累。在《花开锦绣》的乱世里，你就是那个用爱与信念凝聚人心的灵魂人物。" },
      "ENFP": { name: "木槿", yayi: "朝开暮落，自由追光", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E6%9C%A8%E6%A7%BF.jpg", poem: "你的眼睛里有星星，而且是一整片银河。你对世界永远保持三岁小孩般的好奇，能在最枯燥的日常里挖出宝藏。你讨厌“一成不变”四个字，就像木槿花朝开暮落，每天都是新的。你热情来得快去得也快，但每一份热情都是百分百真心。你总被人说“不靠谱”，可真正需要创意和激情时，所有人第一个想到的都是你。《花开锦绣》里那些灵动跳脱、绝处逢生的情节，正是你的人生BGM。" },

      "ESTP": { name: "紫薇", yayi: "独占芳菲，冒险玩家", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%B4%AB%E8%96%87.jpg", poem: "你是天生的“急智者”，越紧张越兴奋，越混乱越清醒。你像紫薇花，盛夏独放，敢与烈日争辉。你热衷冒险，享受不可预知的刺激，对“按部就班”四个字有着本能的抗拒。你的口才和反应速度一流，在谈判桌上几乎从没输过。别人觉得你冲动，只有你知道，你的每一次“冒险”都经过了脑内高速模拟。《花开锦绣》里那些绝境反转、以奇制胜的名场面，你闭着眼都能演。" },
      "ESFP": { name: "合欢", yayi: "夜合欢颜，人间烟火", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E5%90%88%E6%AC%A2.jpg", poem: "你是人群中的“多巴胺喷射机”，有你在的地方，再冷的场子也能沸腾起来。你热爱生活本身，连吃碗面都能吃出米其林的感觉。你的共情能力直白而热烈，朋友失恋，你比他还难过；朋友升职，你比他还开心。你偶尔也会在深夜感到孤独，但睡一觉又满血复活。你的快乐不是傻，而是选择用热烈去拥抱这个不完美的世界。《花开锦绣》里那些嬉笑怒骂、充满烟火气的瞬间，就是你存在的意义。" },
      "EI_balance": { name: "木兰", yayi: "内外兼修，双面镜心", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E6%9C%A8%E5%85%B0.jpg", poem: "你在人群中可以谈笑风生，转身也能享受独处的深邃。你既不是社牛也不是社恐，而是“社适”——你能根据场合自动切换频率。你既能享受热闹的共鸣，又需要安静的蓄能，像木兰一样，在庭院与野地之间自由生长。你最大的天赋是“分寸感”，从不越界，也从不冷场。在《花开锦绣》里，你就是那个既能周旋于朝堂、又能隐居于山野的双面智者。" },
      "SN_balance": { name: "白芷", yayi: "虚实相生，通感之灵", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%99%BD%E8%8A%B7.jpg", poem: "你既爱那些具体可触的细节——比如茶水的温度、布料的手感，也沉迷于抽象的诗意和遥远的幻想。你像白芷，既可用作入药的实体，又散发着通灵的异香。你在现实与理想之间搭了一座桥，让务实的人觉得你不飘，让浪漫的人觉得你不俗。你的思维常常“通感”——看见颜色会闻到味道，听见音乐会看见画面。《花开锦绣》的世界观，就是为你这种通感灵魂设计的。" },
      "TF_balance": { name: "泽兰", yayi: "情理交融，慈悲刀锋", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E6%B3%BD%E5%85%B0.jpg", poem: "你是人间罕见的“理性与感性双核驱动”者。分析问题时，你的逻辑冷静得像手术刀；但涉及人情时，你的心肠又软得像棉花糖。你可以在谈判桌上寸步不让，回家却为流浪猫掉眼泪。你既不被情绪绑架，也不被数据异化，你总是在天平两端找到最优雅的平衡点。《花开锦绣》里那些既能运筹帷幄、又能深情相拥的角色，正是你的灵魂剪影。" },
      "JP_balance": { name: "结香", yayi: "刚柔并济，自在从容", img: "https://flower-image-1449725281.cos.ap-shanghai.myqcloud.com/%E7%BB%93%E9%A6%99.jpg", poem: "你既享受计划的秩序感，又迷恋变数的惊喜。你可以花三天做一份完美行程，然后到了目的地全部推翻，随性乱逛。你既不像J型那样死板，也不像P型那样散漫，你有一种“从容掌控”的能力——看似随波逐流，实则暗握舵盘。你的生活哲学是：心中有纲，行止无疆。《花开锦绣》里那种既懂运筹、又敢冒险的主角气质，说的就是你。" }
    };

    // ================= 预处理：每个维度涉及的题目索引 =================
    const dimQuestions = { EI: [], SN: [], TF: [], JP: [] };
    questions.forEach((q, idx) => {
      q.options.forEach(opt => {
        for (let dim in opt.score) {
          if (dimQuestions[dim].indexOf(idx) === -1) {
            dimQuestions[dim].push(idx);
          }
        }
      });
    });

    // 计算某维度的次级倾向得分（-1..1）
    function calcSubScore(dim) {
      const relatedIndices = dimQuestions[dim];
      let pos = 0, neg = 0;
      relatedIndices.forEach(i => {
        const ans = answers[i];
        if (!ans) return;
        const optIndex = ['A','B','C','D'].indexOf(ans);
        const chosenScore = questions[i].options[optIndex].score;
        if (chosenScore.hasOwnProperty(dim)) {
          if (chosenScore[dim] === 1) pos++;
          else if (chosenScore[dim] === -1) neg++;
        }
      });
      const total = pos + neg;
      return total > 0 ? (pos - neg) / total : 0;
    }

    // ================= 状态变量 =================
    let currentIndex = 0;
    let answers = new Array(questions.length).fill(null);
    let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };

    function loadState() {
      const savedAnswers = localStorage.getItem('quizAnswers');
      const savedScores = localStorage.getItem('quizScores');
      const savedIndex = localStorage.getItem('quizCurrentIndex');
      if (savedAnswers && savedScores && savedIndex) {
        try {
          answers = JSON.parse(savedAnswers);
          scores = JSON.parse(savedScores);
          currentIndex = parseInt(savedIndex, 10);
          if (answers.length !== questions.length) throw new Error('invalid');
        } catch(e) { resetState(); }
      }
    }

    function saveState() {
      localStorage.setItem('quizAnswers', JSON.stringify(answers));
      localStorage.setItem('quizScores', JSON.stringify(scores));
      localStorage.setItem('quizCurrentIndex', currentIndex);
    }

    function resetState() {
      answers = new Array(questions.length).fill(null);
      scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
      currentIndex = 0;
      localStorage.removeItem('quizAnswers');
      localStorage.removeItem('quizScores');
      localStorage.removeItem('quizCurrentIndex');
      localStorage.removeItem('quizResultType');
    }

    loadState();

    const quizDiv = document.getElementById("quiz");
    const submitArea = document.getElementById("submitArea");

    function showQuestion() {
      if (currentIndex < questions.length) {
        const q = questions[currentIndex];
        let html = `<div class="progress">第 ${currentIndex + 1} / ${questions.length} 题</div>`;
        html += `<div class="question">${q.question}</div><div class="options">`;
        const labels = ['A','B','C','D'];
        q.options.forEach((opt, idx) => {
          html += `<button class="option-btn" data-opt="${labels[idx]}" onclick="selectOption('${labels[idx]}', this)">${labels[idx]}. ${opt.text}</button>`;
        });
        html += `</div><button id="nextBtn" class="next-btn" onclick="nextQuestion()" disabled>下一题</button>`;
        quizDiv.innerHTML = html;
        submitArea.style.display = "none";
        if (answers[currentIndex] !== null) {
          document.querySelectorAll('.option-btn').forEach(btn => {
            if (btn.dataset.opt === answers[currentIndex]) btn.classList.add('selected');
          });
          document.getElementById('nextBtn').disabled = false;
        }
      } else {
        quizDiv.innerHTML = '';
        submitArea.style.display = 'block';
      }
    }

    window.selectOption = function(opt, element) {
      document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
      element.classList.add('selected');
      answers[currentIndex] = opt;
      document.getElementById('nextBtn').disabled = false;
    };

    window.nextQuestion = function() {
      if (answers[currentIndex] === null) { alert('请选择一个选项'); return; }
      const q = questions[currentIndex];
      const opt = answers[currentIndex];
      const scoreDelta = q.options[['A','B','C','D'].indexOf(opt)].score;
      for (let dim in scoreDelta) scores[dim] += scoreDelta[dim];
      currentIndex++;
      saveState();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      showQuestion();
    };

    // ================= 核心：计算类型（新逻辑） =================
    function calculateType() {
      const dims = [
        { key: 'EI', left: 'E', right: 'I', balanceKey: 'EI_balance' },
        { key: 'SN', left: 'S', right: 'N', balanceKey: 'SN_balance' },
        { key: 'TF', left: 'T', right: 'F', balanceKey: 'TF_balance' },
        { key: 'JP', left: 'J', right: 'P', balanceKey: 'JP_balance' }
      ];

      // 判断平衡维度
      const balanced = dims.filter(d => Math.abs(scores[d.key]) < 2);
      const nonBalanced = dims.filter(d => Math.abs(scores[d.key]) >= 2);

      // 如果没有平衡维度，直接返回标准型
      if (balanced.length === 0) {
        return nonBalanced.map(d => scores[d.key] >= 2 ? d.left : d.right).join('');
      }

      // 如果恰好一个平衡维度，返回平衡花神
      if (balanced.length === 1) {
        return balanced[0].balanceKey;
      }

      // 多个平衡维度（≥2），执行加权回溯归入标准型
      // 先对非平衡维度确定字母
      const decisions = {}; // dim -> letter
      nonBalanced.forEach(d => {
        decisions[d.key] = scores[d.key] >= 2 ? d.left : d.right;
      });

      // 对每个平衡维度计算次级倾向
      const subScores = {};
      balanced.forEach(d => {
        subScores[d.key] = calcSubScore(d.key);
      });

      // 收集尚未确定字母的维度（平衡维度）
      const pending = balanced.map(d => d.key); // 顺序按 dims 优先级

      // 递归确定：每次取次级得分绝对值最大的维度破平
      while (pending.length > 0) {
        // 找出 pending 中绝对值最大的维度（优先级用于并列）
        let bestDim = null;
        let bestAbs = -1;
        pending.forEach(dim => {
          const abs = Math.abs(subScores[dim]);
          if (abs > bestAbs) {
            bestAbs = abs;
            bestDim = dim;
          } else if (abs === bestAbs) {
            // 并列时按优先级 EI > SN > TF > JP
            if (dims.findIndex(d => d.key === dim) < dims.findIndex(d => d.key === bestDim)) {
              bestDim = dim;
            }
          }
        });

        // 确定 bestDim 的字母
        const sub = subScores[bestDim];
        if (sub > 0) {
          decisions[bestDim] = dims.find(d => d.key === bestDim).left;
        } else if (sub < 0) {
          decisions[bestDim] = dims.find(d => d.key === bestDim).right;
        } else {
          // 次级得分也为0，强制设为正向（left）
          decisions[bestDim] = dims.find(d => d.key === bestDim).left;
        }
        // 从 pending 移除
        const index = pending.indexOf(bestDim);
        pending.splice(index, 1);
      }

      // 按 dims 顺序组合四字母
      return dims.map(d => decisions[d.key]).join('');
    }

    // ================= 预约引导逻辑 =================
    const guideModal = document.getElementById("guideModal");
    const reserveLink = document.getElementById("reserveLink");
    const reservedBtnContainer = document.getElementById("reservedBtnContainer");

    function createReservedButton() {
      if (document.getElementById("alreadyReservedBtn")) return;
      const btn = document.createElement("button");
      btn.id = "alreadyReservedBtn";
      btn.className = "btn-primary";
      btn.innerText = "我已预约，查看结果";
      btn.addEventListener("click", showResult);
      reservedBtnContainer.innerHTML = "";
      reservedBtnContainer.appendChild(btn);
    }

    function updateGuideModal() {
      if (localStorage.getItem("hasClickedReserve") === "true") {
        reserveLink.style.display = "none";
        createReservedButton();
      } else {
        reserveLink.style.display = "inline-block";
        reservedBtnContainer.innerHTML = "";
      }
    }

    reserveLink.addEventListener("click", function(e) {
      e.preventDefault();
      localStorage.setItem("hasClickedReserve", "true");
      window.open(reserveLink.href, "_blank");
      updateGuideModal();
    });

    window.addEventListener("focus", function() {
      if (guideModal.style.display === "flex") updateGuideModal();
    });

    document.getElementById("submitBtn").addEventListener("click", function() {
      saveState();
      if (localStorage.getItem("hasClickedReserve") === "true") {
        showResult();
      } else {
        guideModal.style.display = "flex";
        updateGuideModal();
      }
    });

    function showResult() {
      guideModal.style.display = "none";
      let typeKey = localStorage.getItem('quizResultType');
      if (!typeKey) {
        typeKey = calculateType();
        localStorage.setItem('quizResultType', typeKey);
      }
      const resultData = results[typeKey];
      if (!resultData) return;
      document.getElementById("flowerName").innerText = resultData.name;
      document.getElementById("flowerYayi").innerText = resultData.yayi;
      const imgElement = document.getElementById("flowerImg");
      if (resultData.img && resultData.img.trim() !== "") {
        imgElement.src = resultData.img;
        imgElement.style.display = "block";
      } else {
        imgElement.style.display = "none";
      }
      document.getElementById("flowerPoem").innerText = resultData.poem;
      document.getElementById("resultModal").style.display = "flex";
    }

    window.closeResult = function() {
      document.getElementById("resultModal").style.display = "none";
    };

    function checkAutoShowResult() {
      if (currentIndex === questions.length && localStorage.getItem('hasClickedReserve') === 'true') {
        quizDiv.innerHTML = '';
        submitArea.style.display = 'none';
        showResult();
        return true;
      }
      return false;
    }

    if (!checkAutoShowResult()) {
      showQuestion();
    }
  </script>
